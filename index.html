<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rainier Pressure Washing | Seattle's #1 Exterior Cleaning</title>
  <meta name="description" content="Professional pressure washing in Seattle, Bellevue, Kirkland & surrounding areas. Driveways, siding, decks, roofs & more. Free quotes. Local Seattle business." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0a1f44;
      --blue: #1a56db;
      --blue-light: #e8f0fe;
      --orange: #f97316;
      --orange-dark: #ea6c0a;
      --gray: #64748b;
      --gray-light: #f8fafc;
      --white: #ffffff;
      --text: #1e293b;
      --border: #e2e8f0;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text);
      line-height: 1.6;
      background: var(--white);
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: var(--navy);
      padding: 0 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <nav><span>Rainier Pressure Washing</span></nav>
</body>
</html>
